name: Build Repere IPA

# Quand lancer le build :
# - À chaque push sur main
# - Manuellement depuis l'onglet Actions de GitHub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ipa:
    name: 🏗️ Build IPA
    runs-on: macos-14  # Mac virtuel gratuit avec Xcode pré-installé

    steps:
      # 1. Récupérer le code
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Installer XcodeGen (génère le .xcodeproj à partir de project.yml)
      - name: 🔧 Install XcodeGen
        run: brew install xcodegen

      # 3. Sélectionner la version de Xcode
      - name: 🍎 Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # 4. Générer le projet Xcode
      - name: ⚙️ Generate Xcode Project
        run: xcodegen generate

      # 5. Compiler l'app (sans signature pour sideload)
      - name: 🔨 Build App
        run: |
          xcodebuild build \
            -project Repere.xcodeproj \
            -scheme Repere \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" > build.log 2>&1 || {
              echo "### ❌ ERREUR DE COMPILATION :" >> $GITHUB_STEP_SUMMARY
              echo '```text' >> $GITHUB_STEP_SUMMARY
              tail -n 50 build.log >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              exit 1
            }

      # 6. Créer le fichier IPA
      - name: 📦 Create IPA
        run: |
          mkdir -p build/Payload
          cp -r build/DerivedData/Build/Products/Release-iphoneos/Repere.app build/Payload/
          cd build
          zip -r Repere.ipa Payload
          echo "✅ IPA created successfully!"
          ls -la Repere.ipa

      # 7. Uploader l'IPA comme artifact téléchargeable
      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Repere-IPA
          path: build/Repere.ipa
          retention-days: 30
