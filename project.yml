name: Repere
options:
  bundleIdPrefix: com.repere
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  developmentLanguage: fr
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"

targets:
  Repere:
    type: application
    platform: iOS
    sources:
      - path: Repere
        excludes:
          - "*.xcassets/**/.*"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.repere.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Repere/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: Repere/Repere.entitlements
      properties:
        com.apple.developer.nearby-interaction: true
    dependencies:
      - framework: CoreBluetooth.framework
        embed: false
